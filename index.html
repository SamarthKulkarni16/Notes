<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/jpg" href="logo.jpg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #13151a;
    --panel: #1d2128;
    --text: #e8e6e1;
    --muted: #6b7280;
    --accent: #8b9d83;
    --accent-dim: #5c6b56;
    --error: #b3725a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--text);
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 8vh 24px 4vh;
  }

  .page {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    gap: 0.5rem 1rem;
  }

  .dateblock {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .date {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 600;
    font-size: 1.9rem;
    font-optical-sizing: auto;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .time {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    white-space: nowrap;
    cursor: default;
  }

  .status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.4s ease;
  }

  .status[data-state="saved"] .dot { background: var(--muted); }
  .status[data-state="syncing"] .dot {
    background: var(--accent);
    animation: pulse 1.1s ease-in-out infinite;
  }
  .status[data-state="synced"] .dot { background: var(--accent); }
  .status[data-state="error"] .dot { background: var(--error); }
  .status[data-state="error"] { color: var(--error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .editor {
    flex: 1;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 1.08rem;
    line-height: 1.75;
    caret-color: var(--accent);
  }

  .editor::placeholder { color: #3a3f48; }

  @media (prefers-reduced-motion: reduce) {
    .status .dot { animation: none !important; }
  }

  /* Settings gear: invisible by default, revealed only when hovering the corner zone */
  .settings-corner {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 64px;
    height: 64px;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 16px;
    z-index: 5;
  }

  .settings-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.25s ease, background 0.2s ease;
  }

  .settings-corner:hover .settings-btn,
  .settings-btn:focus-visible {
    opacity: 1;
  }
  .settings-btn:hover { background: var(--panel); }
  .settings-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Keyboard users can still tab to it even though it's invisible until focused */
  .settings-btn:focus { opacity: 1; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 11, 14, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel);
    border-radius: 10px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .modal h2 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 600;
    font-size: 1.2rem;
  }

  .modal p {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .modal label {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
  }

  .modal input {
    background: #0e1014;
    border: 1px solid #2a2f38;
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 0.9rem;
    font-family: 'Inter', sans-serif;
    outline: none;
  }
  .modal input:focus { border-color: var(--accent-dim); }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 8px;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
  }

  .btn-primary { background: var(--accent-dim); color: var(--text); }
  .btn-primary:hover { background: var(--accent); }
  .btn-secondary { background: transparent; color: var(--muted); }
  .btn-secondary:hover { color: var(--text); }

  /* History overlay */
  .history-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 11, 14, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 20;
    padding: 5vh 20px;
  }
  .history-overlay.open { display: flex; }

  .history-panel {
    background: var(--panel);
    border-radius: 12px;
    width: 100%;
    max-width: 560px;
    height: 100%;
    max-height: 720px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .history-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid #262b33;
    flex-shrink: 0;
  }

  .history-head h2 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 600;
    font-size: 1.15rem;
  }

  .history-close, .history-back {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    padding: 4px 6px;
  }
  .history-close:hover, .history-back:hover { color: var(--text); }

  .history-list {
    overflow-y: auto;
    flex: 1;
  }

  .history-item {
    padding: 16px 22px;
    border-bottom: 1px solid #20242c;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .history-item:hover { background: #23272f; }

  .history-item-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
    gap: 10px;
  }

  .history-item-date {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 600;
    font-size: 1rem;
    color: var(--text);
  }

  .history-item-time {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .history-item-preview {
    font-size: 0.88rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-empty, .history-loading, .history-error {
    padding: 40px 22px;
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
  }
  .history-error { color: var(--error); }

  .history-reader {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .history-reader-scroll {
    overflow-y: auto;
    flex: 1;
    padding: 20px 22px 30px;
  }

  .history-reader-date {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 600;
    font-size: 1.4rem;
    margin-bottom: 4px;
  }

  .history-reader-time {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .history-reader-body {
    font-size: 1rem;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="dateblock">
      <div class="date" id="dateLabel"></div>
      <div class="time" id="timeLabel"></div>
    </div>
    <div class="status" id="status" data-state="saved" title="">
      <span class="dot"></span>
      <span id="statusText">saved</span>
    </div>
  </div>

  <textarea class="editor" id="editor" placeholder="Start writing…" autofocus spellcheck="true"></textarea>
</div>

<div class="settings-corner">
  <button class="settings-btn" id="settingsBtn" aria-label="Settings" title="Settings">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>GitHub connection</h2>
    <p>This token is stored only in this browser and is used to save notes directly to your <code>notes</code> repo. Use a fine-grained token scoped to that repo only.</p>

    <label for="tokenInput">Personal access token</label>
    <input type="password" id="tokenInput" placeholder="github_pat_…" autocomplete="off">

    <label for="ownerInput">GitHub username</label>
    <input type="text" id="ownerInput" placeholder="samarthkulkarni16" autocomplete="off">

    <label for="repoInput">Repository name</label>
    <input type="text" id="repoInput" placeholder="notes" autocomplete="off">

    <div class="modal-actions">
      <button class="btn btn-secondary" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalSave">Save</button>
    </div>
  </div>
</div>

<div class="history-overlay" id="historyOverlay">
  <div class="history-panel">
    <div class="history-head">
      <h2>History</h2>
      <button class="history-close" id="historyClose">Close</button>
    </div>

    <div class="history-list" id="historyList"></div>

    <div class="history-reader" id="historyReader">
      <div class="history-head">
        <button class="history-back" id="historyBack">← Back</button>
      </div>
      <div class="history-reader-scroll">
        <div class="history-reader-date" id="readerDate"></div>
        <div class="history-reader-time" id="readerTime"></div>
        <div class="history-reader-body" id="readerBody"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---------- Config storage (localStorage, device-only) ----------
  const CFG_KEY = "notesync_config";
  function getConfig() {
    try { return JSON.parse(localStorage.getItem(CFG_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function setConfig(cfg) {
    localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
  }

  // ---------- IndexedDB (offline-safe local store) ----------
  const DB_NAME = "notesync_db";
  const STORE = "pending_notes";
  let dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: "filename" });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });

  async function idbPut(record) {
    const db = await dbPromise;
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).put(record);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function idbDelete(filename) {
    const db = await dbPromise;
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(filename);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function idbGetAll() {
    const db = await dbPromise;
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readonly");
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  // ---------- Date / filename setup (fixed for this session/visit) ----------
  const now = new Date();
  const pad = n => String(n).padStart(2, "0");

  const dateLabel = now.toLocaleDateString(undefined, {
    year: "numeric", month: "long", day: "numeric"
  });
  const timeLabel = now.toLocaleTimeString(undefined, {
    hour: "numeric", minute: "2-digit"
  });

  document.getElementById("dateLabel").textContent = dateLabel;
  document.getElementById("timeLabel").textContent = timeLabel;

  const filename = `notes/${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.md`;
  const isoStamp = now.toISOString();

  function buildFileContent(body) {
    return `# ${dateLabel}\n### ${timeLabel}\n\n${body}`;
  }

  // ---------- Status indicator ----------
  const statusEl = document.getElementById("status");
  const statusText = document.getElementById("statusText");
  function setStatus(state, label, title) {
    statusEl.dataset.state = state;
    statusText.textContent = label;
    statusEl.title = title || "";
  }

  // ---------- GitHub API push ----------
  async function getExistingSha(url, cfg) {
    const res = await fetch(url, {
      method: "GET",
      headers: {
        "Authorization": `Bearer ${cfg.token}`,
        "Accept": "application/vnd.github+json"
      }
    });
    if (res.status === 404) return null; // file doesn't exist yet — fine, create it
    if (!res.ok) {
      const errBody = await res.text().catch(() => "");
      throw new Error(`github_${res.status}: ${errBody.slice(0, 200)}`);
    }
    const data = await res.json();
    return data.sha;
  }

  async function pushToGitHub(record) {
    const cfg = getConfig();
    if (!cfg.token || !cfg.owner || !cfg.repo) {
      throw new Error("not_configured");
    }

    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${record.filename}`;
    const content = buildFileContent(record.body);
    const b64 = btoa(unescape(encodeURIComponent(content)));

    // Check whether this file already exists — if it does, we need its sha to update it
    const sha = await getExistingSha(url, cfg);

    const payload = {
      message: sha ? `Update note ${record.filename}` : `Add note ${record.filename}`,
      content: b64
    };
    if (sha) payload.sha = sha;

    const res = await fetch(url, {
      method: "PUT",
      headers: {
        "Authorization": `Bearer ${cfg.token}`,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const errBody = await res.text().catch(() => "");
      throw new Error(`github_${res.status}: ${errBody.slice(0, 200)}`);
    }
    return res.json();
  }

  // ---------- Sync queue: flush all pending notes ----------
  let flushing = false;
  async function flushQueue() {
    if (flushing) return;
    if (!navigator.onLine) return;
    const cfg = getConfig();
    if (!cfg.token || !cfg.owner || !cfg.repo) return;

    flushing = true;
    try {
      const pending = await idbGetAll();
      const nonEmpty = pending.filter(r => r.body && r.body.trim().length > 0);
      for (const record of nonEmpty) {
        setStatus("syncing", "syncing…");
        try {
          await pushToGitHub(record);
          await idbDelete(record.filename);
          setStatus("synced", "synced");
        } catch (e) {
          console.error("Sync failed for", record.filename, e);
          setStatus("error", "sync failed", String(e.message || e));
          // stop on first failure; will retry whole queue next trigger
          break;
        }
      }
      // if nothing pending remains for the *current* note, reflect that
      const stillPending = await idbGetAll();
      const currentStillPending = stillPending.some(r => r.filename === filename);
      if (!currentStillPending && statusEl.dataset.state !== "error") {
        setStatus("synced", "synced");
      }
    } finally {
      flushing = false;
    }
  }

  // ---------- Editor wiring ----------
  const editor = document.getElementById("editor");
  let saveTimer = null;
  let syncTimer = null;

  function scheduleLocalSave() {
    setStatus("saved", "saving…");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      const body = editor.value;
      if (body.trim().length === 0) {
        setStatus("saved", "empty");
        return;
      }
      await idbPut({ filename, body, isoStamp });
      setStatus("saved", "saved locally");

      clearTimeout(syncTimer);
      syncTimer = setTimeout(() => { flushQueue(); }, 1500);
    }, 600);
  }

  editor.addEventListener("input", scheduleLocalSave);

  // Flush on load (covers notes left over from a previous offline session)
  window.addEventListener("load", () => { flushQueue(); });
  window.addEventListener("online", () => { flushQueue(); });

  // Best-effort flush if the tab is closing while online and unsynced
  window.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") flushQueue();
  });

  // ---------- Settings modal ----------
  const overlay = document.getElementById("modalOverlay");
  const settingsBtn = document.getElementById("settingsBtn");
  const tokenInput = document.getElementById("tokenInput");
  const ownerInput = document.getElementById("ownerInput");
  const repoInput = document.getElementById("repoInput");

  function openModal() {
    const cfg = getConfig();
    tokenInput.value = cfg.token || "";
    ownerInput.value = cfg.owner || "";
    repoInput.value = cfg.repo || "";
    overlay.classList.add("open");
  }
  function closeModal() { overlay.classList.remove("open"); }

  settingsBtn.addEventListener("click", openModal);
  document.getElementById("modalCancel").addEventListener("click", closeModal);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });

  document.getElementById("modalSave").addEventListener("click", () => {
    setConfig({
      token: tokenInput.value.trim(),
      owner: ownerInput.value.trim(),
      repo: repoInput.value.trim() || "notes"
    });
    closeModal();
    flushQueue();
  });

  // ---------- Initial state ----------
  (async () => {
    const cfg = getConfig();
    if (!cfg.token) {
      setStatus("saved", "not connected", "Open settings to connect your GitHub repo");
    }
    // Surface any leftover unsynced notes from earlier offline sessions
    const pending = await idbGetAll();
    if (pending.length > 0 && navigator.onLine) {
      flushQueue();
    }
  })();

  editor.focus();

  // ---------- History (triple-click blank area) ----------
  const historyOverlay = document.getElementById("historyOverlay");
  const historyList = document.getElementById("historyList");
  const historyReader = document.getElementById("historyReader");
  const historyClose = document.getElementById("historyClose");
  const historyBack = document.getElementById("historyBack");
  const readerDate = document.getElementById("readerDate");
  const readerTime = document.getElementById("readerTime");
  const readerBody = document.getElementById("readerBody");
  const pageEl = document.querySelector(".page");

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function parseNoteContent(fname, text, isDraft) {
    const lines = text.split("\n");
    const date = (lines[0] || "").replace(/^#\s*/, "").trim();
    const time = (lines[2] || "").replace(/^###\s*/, "").trim();
    const body = lines.slice(4).join("\n").trim();
    const preview = (body.split("\n").find(l => l.trim().length > 0) || "").trim();
    return { filename: fname, date, time, body, preview, isDraft };
  }

  function draftContent(record) {
    const d = new Date(record.isoStamp);
    const dl = d.toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
    const tl = d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    return `# ${dl}\n### ${tl}\n\n${record.body}`;
  }

  async function loadAllNotes() {
    const cfg = getConfig();
    let remoteFiles = [];

    if (cfg.owner && cfg.repo) {
      const headers = { "Accept": "application/vnd.github+json" };
      if (cfg.token) headers["Authorization"] = `Bearer ${cfg.token}`;
      const res = await fetch(
        `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/notes`,
        { headers }
      );
      if (res.ok) {
        const list = await res.json();
        remoteFiles = Array.isArray(list) ? list.filter(f => f.name.endsWith(".md")) : [];
      } else if (res.status !== 404) {
        throw new Error(`github_${res.status}`);
      }
    }

    const remoteNotes = await Promise.all(remoteFiles.map(async f => {
      const r = await fetch(f.download_url);
      const text = await r.text();
      return parseNoteContent(`notes/${f.name}`, text, false);
    }));

    const pending = await idbGetAll();
    const pendingNotes = pending
      .filter(r => r.body && r.body.trim().length > 0)
      .map(r => parseNoteContent(r.filename, draftContent(r), true));

    const byName = new Map();
    for (const n of remoteNotes) byName.set(n.filename, n);
    for (const n of pendingNotes) byName.set(n.filename, n); // local drafts win (freshest)

    return Array.from(byName.values()).sort((a, b) => b.filename.localeCompare(a.filename));
  }

  function renderHistoryList(notes) {
    if (notes.length === 0) {
      historyList.innerHTML = '<div class="history-empty">No notes yet.</div>';
      return;
    }
    historyList.innerHTML = "";
    notes.forEach(n => {
      const item = document.createElement("div");
      item.className = "history-item";
      item.innerHTML = `
        <div class="history-item-top">
          <span class="history-item-date">${escapeHtml(n.date || "Untitled")}</span>
          <span class="history-item-time">${escapeHtml(n.time || "")}${n.isDraft ? " · syncing" : ""}</span>
        </div>
        <div class="history-item-preview">${escapeHtml(n.preview) || "(empty)"}</div>
      `;
      item.addEventListener("click", () => openReader(n));
      historyList.appendChild(item);
    });
  }

  function openReader(n) {
    readerDate.textContent = n.date || "Untitled";
    readerTime.textContent = n.time || "";
    readerBody.textContent = n.body || "";
    historyList.style.display = "none";
    historyReader.style.display = "flex";
  }

  function showHistoryList() {
    historyReader.style.display = "none";
    historyList.style.display = "";
  }

  async function openHistory() {
    historyOverlay.classList.add("open");
    showHistoryList();
    historyList.innerHTML = '<div class="history-loading">Loading…</div>';
    try {
      const notes = await loadAllNotes();
      renderHistoryList(notes);
    } catch (e) {
      historyList.innerHTML = `<div class="history-error">Couldn't load history (${escapeHtml(String(e.message || e))})</div>`;
    }
  }

  function closeHistory() {
    historyOverlay.classList.remove("open");
  }

  historyClose.addEventListener("click", closeHistory);
  historyBack.addEventListener("click", showHistoryList);
  historyOverlay.addEventListener("click", (e) => { if (e.target === historyOverlay) closeHistory(); });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && historyOverlay.classList.contains("open")) closeHistory();
  });

  // Triple-click on blank page area (not the editor, header, or buttons) opens history
  document.addEventListener("click", (e) => {
    if (e.detail === 3 && (e.target === document.body || e.target === pageEl || e.target === document.documentElement)) {
      openHistory();
    }
  });
})();
</script>
</body>
</html>
